serverName                Bagisto
user                      devansh.bawari
group                     devansh.bawari
priority                  0
inMemBufSize              60M
swappingDir               /tmp/lshttpd/swap
autoFix503                1
gracefulRestartTimeout    300
mime                      conf/mime.properties
showVersionNumber         0
adminEmails               root@localhost

errorlog logs/error.log {
  logLevel                INFO
  debugLevel              0
  rollingSize             10M
  enableStderrLog         1
}

accesslog logs/access.log {
  rollingSize             10M
  keepDays                30
  compressArchive         0
}

indexFiles                index.php, index.html

expires {
  enableExpires           1
  expiresByType           image/*=A2592000, text/css=A2592000, application/javascript=A2592000, application/x-javascript=A2592000, font/*=A2592000, application/font-woff2=A2592000, image/svg+xml=A2592000
}

tuning {
  maxConnections          10000
  connTimeout             300
  maxKeepAliveReq         1000
  keepAliveTimeout        5
  eventDispatcher         best
  maxReqURLLen            32768
  maxReqHeaderSize        65536
  maxReqBodySize          2047M
  maxDynRespHeaderSize    32768
  maxDynRespSize          2047M
  useSendfile             1
  fileETag                28
  enableGzipCompress      1
  enableDynGzipCompress   1
  gzipCompressLevel       6
  compressibleTypes       text/*, application/x-javascript, application/xml, application/javascript, image/svg+xml, application/rss+xml, application/json
}

fileAccessControl {
  followSymbolLink        1
  checkSymbolLink         0
  requiredPermissionMask  000
  restrictedPermissionMask 000
}

scripthandler {
  add                     lsapi:lsphp php
}

extprocessor lsphp {
  type                    lsapi
  address                 127.0.0.1:9000
  maxConns                35
  initTimeout             60
  retryTimeout            0
  persistConn             1
  respBuffer              0
  autoStart               0
  backlog                 100
  instances               1
}

# ---------------------------------------------------------------------------
# All Bagisto sites share one template (conf/templates/bagisto.conf).
# To add a site: drop a `member <app-dir-name> { vhDomain ... }` below.
# vhRoot is derived as /var/www/html/bagisto/apps/$VH_NAME, so the member
# name MUST match the app directory under apps/.
# ---------------------------------------------------------------------------
vhTemplate bagistoApps {
  templateFile            $SERVER_ROOT/conf/templates/bagisto.conf
  listeners               Default

  member default {
    vhDomain              localhost, 127.0.0.1
  }

  member 2-3-x-dev {
    vhDomain              bagisto-2-3-x-dev.test
  }

  member 2-4-x-dev {
    vhDomain              bagisto-2-4-x-dev.test
  }

  member 2-5-x-dev {
    vhDomain              bagisto-2-5-x-dev.test
  }

  member multi-channel {
    vhDomain              bagisto-multi-channel.test, c1.bagisto-multi-channel.test, c2.bagisto-multi-channel.test
  }

  member module-1 {
    vhDomain              bagisto-module-1.test
  }

  member module-2 {
    vhDomain              bagisto-module-2.test
  }
}

# ---------------------------------------------------------------------------
# Sites under bagisto/shared/<name>/public (reuse the same template, but with
# an explicit per-member vhRoot since they live under shared/, not apps/).
# To add one: add a member with a unique name + its vhDomain + its vhRoot.
# ---------------------------------------------------------------------------
vhTemplate bagistoShared {
  templateFile            $SERVER_ROOT/conf/templates/bagisto.conf
  listeners               Default

  member shared-default {
    vhDomain              192.168.15.114
    vhRoot                /var/www/html/bagisto/shared/default
  }

  member devansh {
    vhDomain              devansh.webkul.in
    vhRoot                /var/www/html/bagisto/shared/devansh
  }

  member devansh-benchmarking {
    vhDomain              devansh-benchmarking.webkul.in
    vhRoot                /var/www/html/bagisto/shared/devansh-benchmarking
  }
}

listener Default {
  address                 *:80
  secure                  0
}
