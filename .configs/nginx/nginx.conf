server {
    listen 80;
    listen [::]:80;
    server_name law-tribe.test;

    root /var/www/html/law-tribe/public;
    index index.php;
    charset utf-8;

    client_max_body_size 100M;

    # -------------------------------------------------
    # ✅ Normalize /community → /community/
    # -------------------------------------------------
    location = /community {
        return 301 /community/;
    }

    # -------------------------------------------------
    # ✅ ECS / ALB Health Check
    # -------------------------------------------------
    location = /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
    
    # -------------------------------------------------
    # ✅ Static assets (Vite / public files)
    # /community/build/... → /public/build/...
    # -------------------------------------------------
    location ^~ /community/build/ {
        alias /var/www/html/law-tribe/public/build/;
        try_files $uri =404;

        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------
    # ✅ PHP entry handling
    # -------------------------------------------------
    location = /community/index.php {
        try_files /not_exists @octane;
    }

    # -------------------------------------------------
    # ✅ Laravel routes under /community
    # -------------------------------------------------
    location ^~ /community/ {
        try_files $uri $uri/ @octane;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    error_page 404 /index.php;

    # -------------------------------------------------
    # ✅ Octane handler
    # -------------------------------------------------
    location @octane {
        set $suffix "";

        if ($uri = /index.php) {
            set $suffix ?$query_string;
        }

        # Strip /community before forwarding to Laravel
        rewrite ^/community(/.*)$ $1 break;
        rewrite ^/community$ / break;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /community;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://127.0.0.1:8000$suffix;
    }

    # -------------------------------------------------
    # Security
    # -------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
